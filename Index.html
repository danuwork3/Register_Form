<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Registration Form</h1>
        <!-- MAILTO FORM -->
        <form action="mailto:danuwork3@gmail.com" method="post" enctype="text/plain">

            <div class="group">
                <label>Full Name</label>
                <div class="row">
                    <input type="text" name="firstName" placeholder="First Name" required>
                    <input type="text" name="lastName" placeholder="Last Name" required>
                </div>
            </div>

            <div class="group">
                <label>E-mail</label>
                <input type="text" placeholder="example@gmail.com" required>
            </div>

            <div class="group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Phone number" required>
            </div>

            <div class="group">
                <label>Address</label>
                <input type="text" name="address1" placeholder="Street Address"><br>
                <input type="text" name="address2" placeholder="Street Address Line 2"><br>
            </div>

            <div class="group">
                <input type="text" name="city" placeholder="City">
                <input type="text" name="state" placeholder="State/Province">
            </div>

            <button type="submit" class="submit-btn">Register</button>

        </form>
    </div>
</body>
</html>
